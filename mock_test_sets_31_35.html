<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALP Engineering Mock Test — Sets 31–35</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Nunito:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f6fa;
  --white: #ffffff;
  --border: #e2e6f0;
  --accent: #4f6ef7;
  --blue: #3b82f6;
  --success: #16a34a;
  --error: #dc2626;
  --text: #1e2235;
  --muted: #6b7280;
  --explanation-bg: #fffbeb;
  --explanation-border: #f59e0b;
  --explanation-text: #92400e;
  --img-bg: #f8f9ff;
  --img-border: #c7d0f0;
  --shadow: 0 2px 8px rgba(0,0,0,.06);
  --shadow-md: 0 4px 16px rgba(79,110,247,.10);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  background-image: radial-gradient(ellipse at 20% 10%, rgba(79,110,247,.07) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 80%, rgba(22,163,74,.05) 0%, transparent 60%);
}

h1,h2,h3,h4 { font-family: 'Syne', sans-serif; }
code, .mono { font-family: 'JetBrains Mono', monospace; }

/* SCREENS */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }

/* ===== HOME SCREEN ===== */
#home {
  align-items: center;
  padding: 40px 20px 60px;
}

.home-header {
  text-align: center;
  margin-bottom: 40px;
}

.home-header .eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 10px;
}

.home-header h1 {
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 800;
  color: var(--text);
  line-height: 1.1;
  margin-bottom: 10px;
}

.home-header h1 span { color: var(--accent); }

.home-header p {
  color: var(--muted);
  font-size: 15px;
  font-weight: 400;
  max-width: 480px;
  margin: 0 auto;
}

/* Mode toggle */
.mode-toggle {
  display: flex;
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 50px;
  padding: 4px;
  margin-bottom: 40px;
  box-shadow: var(--shadow);
  gap: 2px;
}

.mode-btn {
  padding: 8px 22px;
  border-radius: 50px;
  border: none;
  background: transparent;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: all .2s;
}

.mode-btn.active {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 8px rgba(79,110,247,.3);
}

/* Set cards grid */
.sets-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
  width: 100%;
  max-width: 900px;
}

.set-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 28px 24px;
  cursor: pointer;
  transition: all .22s;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}

.set-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--blue));
  opacity: 0;
  transition: opacity .2s;
}

.set-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
  border-color: var(--accent);
}

.set-card:hover::before { opacity: 1; }

.set-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.set-card h3 {
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 6px;
}

.set-card p {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 18px;
  line-height: 1.5;
}

.set-meta {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  background: #eef0ff;
  color: var(--accent);
  border-radius: 6px;
  padding: 3px 8px;
  letter-spacing: .5px;
}

.start-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 18px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 10px 20px;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  transition: background .2s, transform .15s;
}

.start-btn:hover { background: #3b5bd9; transform: scale(1.02); }

/* ===== QUIZ SCREEN ===== */
#quiz {
  padding: 0;
  flex-direction: column;
}

.quiz-topbar {
  background: var(--white);
  border-bottom: 1.5px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}

.quiz-topbar-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.back-btn {
  background: none;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 6px 10px;
  cursor: pointer;
  color: var(--muted);
  font-size: 16px;
  transition: all .18s;
  line-height: 1;
}

.back-btn:hover { border-color: var(--accent); color: var(--accent); }

.quiz-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: .5px;
}

.timer-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 500;
  color: var(--text);
  background: #eef0ff;
  border-radius: 8px;
  padding: 6px 14px;
  min-width: 70px;
  text-align: center;
}

.timer-badge.warning { background: #fff3cd; color: #c05621; }
.timer-badge.danger { background: #fee2e2; color: var(--error); }

.progress-container {
  padding: 0 24px;
  background: var(--white);
  padding-bottom: 10px;
}

.progress-info {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 6px;
  font-family: 'JetBrains Mono', monospace;
}

.progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--blue));
  border-radius: 4px;
  transition: width .3s ease;
}

/* Dot nav */
.dot-nav-wrap {
  background: var(--white);
  border-bottom: 1.5px solid var(--border);
  padding: 10px 24px;
  overflow-x: auto;
  scrollbar-width: none;
}

.dot-nav-wrap::-webkit-scrollbar { display: none; }

.dot-nav {
  display: flex;
  gap: 6px;
  min-width: max-content;
}

.dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--white);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .18s;
  flex-shrink: 0;
}

.dot.current {
  border-color: var(--accent);
  background: var(--accent);
  color: #fff;
  box-shadow: 0 0 0 3px rgba(79,110,247,.18);
}

.dot.answered-correct { border-color: var(--success); background: #dcfce7; color: var(--success); }
.dot.answered-wrong { border-color: var(--error); background: #fee2e2; color: var(--error); }
.dot.answered { border-color: var(--accent); background: #eef0ff; color: var(--accent); }

/* Question area */
.question-area {
  flex: 1;
  padding: 28px 24px;
  max-width: 800px;
  width: 100%;
  margin: 0 auto;
}

.question-meta {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  align-items: center;
}

.q-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  background: #f0f0f5;
  border-radius: 6px;
  padding: 3px 8px;
}

.q-topic {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  background: #eef0ff;
  color: var(--accent);
  border-radius: 6px;
  padding: 3px 8px;
}

.question-text {
  font-size: 17px;
  font-weight: 600;
  line-height: 1.65;
  margin-bottom: 22px;
  color: var(--text);
}

/* Image placeholder */
.img-placeholder {
  background: var(--img-bg);
  border: 2px dashed var(--img-border);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 8px;
}

.img-placeholder .img-icon { font-size: 32px; }
.img-placeholder .img-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }
.img-placeholder .img-note {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--img-border);
  letter-spacing: .5px;
}

/* Options */
.options-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}

.option-btn {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  cursor: pointer;
  text-align: left;
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  transition: all .18s;
  width: 100%;
  line-height: 1.5;
}

.option-btn:hover:not(:disabled) {
  border-color: var(--accent);
  background: #f9fafe;
  transform: translateX(2px);
}

.option-btn:disabled { cursor: default; }

.option-letter {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  background: #f0f0f5;
  color: var(--muted);
  border-radius: 6px;
  padding: 3px 7px;
  flex-shrink: 0;
  margin-top: 1px;
  transition: all .18s;
}

.option-btn.selected { border-color: var(--accent); background: #eef0ff; }
.option-btn.selected .option-letter { background: var(--accent); color: #fff; }

.option-btn.correct { border-color: var(--success); background: #f0fdf4; }
.option-btn.correct .option-letter { background: var(--success); color: #fff; }

.option-btn.wrong { border-color: var(--error); background: #fff5f5; }
.option-btn.wrong .option-letter { background: var(--error); color: #fff; }

/* Explanation */
.explanation-box {
  background: var(--explanation-bg);
  border-left: 4px solid var(--explanation-border);
  border-radius: 0 10px 10px 0;
  padding: 16px 18px;
  margin-bottom: 20px;
  display: none;
}

.explanation-box.show { display: block; }

.explanation-box .expl-title {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--explanation-border);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.explanation-box p {
  font-size: 14px;
  color: var(--explanation-text);
  line-height: 1.6;
}

/* Nav buttons */
.nav-btns {
  display: flex;
  gap: 10px;
  justify-content: space-between;
  margin-top: 10px;
  padding-bottom: 40px;
}

.nav-btn {
  padding: 11px 24px;
  border-radius: 10px;
  border: none;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  transition: all .18s;
}

.nav-btn.secondary {
  background: var(--white);
  border: 1.5px solid var(--border);
  color: var(--text);
}

.nav-btn.secondary:hover { border-color: var(--accent); color: var(--accent); }

.nav-btn.primary {
  background: var(--accent);
  color: #fff;
}

.nav-btn.primary:hover { background: #3b5bd9; }

.nav-btn.finish {
  background: var(--success);
  color: #fff;
  flex: 1;
}

.nav-btn.finish:hover { background: #15803d; }

/* ===== RESULTS SCREEN ===== */
#results {
  align-items: center;
  padding: 40px 20px 60px;
}

.results-header {
  text-align: center;
  margin-bottom: 36px;
}

.results-header h2 {
  font-size: 32px;
  font-weight: 800;
  margin-bottom: 6px;
}

.results-header p {
  color: var(--muted);
  font-size: 14px;
}

/* Score ring */
.score-ring-wrap {
  position: relative;
  width: 180px;
  height: 180px;
  margin: 0 auto 30px;
}

.score-ring-wrap svg {
  transform: rotate(-90deg);
}

.score-ring-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.score-ring-center .score-pct {
  font-family: 'Syne', sans-serif;
  font-size: 36px;
  font-weight: 800;
  color: var(--text);
  line-height: 1;
}

.score-ring-center .score-lbl {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
  margin-top: 2px;
}

.grade-msg {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 24px;
}

.results-stats {
  display: flex;
  gap: 16px;
  margin-bottom: 32px;
  flex-wrap: wrap;
  justify-content: center;
}

.stat-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 16px 24px;
  text-align: center;
  min-width: 120px;
  box-shadow: var(--shadow);
}

.stat-card .stat-val {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 800;
  display: block;
  margin-bottom: 2px;
}

.stat-card .stat-lbl {
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
}

.stat-card.correct-stat .stat-val { color: var(--success); }
.stat-card.wrong-stat .stat-val { color: var(--error); }
.stat-card.skip-stat .stat-val { color: var(--muted); }

.results-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
}

.action-btn {
  padding: 12px 26px;
  border-radius: 10px;
  border: none;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  transition: all .18s;
}

.action-btn.primary { background: var(--accent); color: #fff; }
.action-btn.primary:hover { background: #3b5bd9; }
.action-btn.secondary { background: var(--white); border: 1.5px solid var(--border); color: var(--text); }
.action-btn.secondary:hover { border-color: var(--accent); color: var(--accent); }

/* ===== REVIEW SCREEN ===== */
#review {
  padding: 0;
}

.review-topbar {
  background: var(--white);
  border-bottom: 1.5px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}

.review-topbar h2 {
  font-size: 18px;
  font-weight: 800;
}

.review-list {
  padding: 24px;
  max-width: 800px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
  padding-bottom: 60px;
}

.review-item {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 22px;
  box-shadow: var(--shadow);
}

.review-item-header {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
  flex-wrap: wrap;
  align-items: center;
}

.review-status {
  font-size: 12px;
  font-weight: 700;
  border-radius: 6px;
  padding: 3px 10px;
  font-family: 'JetBrains Mono', monospace;
}

.review-status.correct-st { background: #dcfce7; color: var(--success); }
.review-status.wrong-st { background: #fee2e2; color: var(--error); }
.review-status.skipped-st { background: #f0f0f5; color: var(--muted); }

.review-item .question-text { font-size: 15px; margin-bottom: 14px; }

.review-options {
  display: flex;
  flex-direction: column;
  gap: 7px;
  margin-bottom: 14px;
}

.review-option {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  font-size: 14px;
  padding: 9px 13px;
  border-radius: 9px;
  border: 1.5px solid var(--border);
  color: var(--muted);
}

.review-option.iscorrect {
  border-color: var(--success);
  background: #f0fdf4;
  color: var(--text);
  font-weight: 600;
}

.review-option.isuser-wrong {
  border-color: var(--error);
  background: #fff5f5;
  color: var(--error);
  text-decoration: line-through;
}

.review-option .opt-ltr {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  background: #f0f0f5;
  border-radius: 5px;
  padding: 2px 6px;
  flex-shrink: 0;
  margin-top: 1px;
}

.review-option.iscorrect .opt-ltr { background: var(--success); color: #fff; }
.review-option.isuser-wrong .opt-ltr { background: var(--error); color: #fff; }

/* Animations */
@keyframes ringFill {
  from { stroke-dashoffset: 502; }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.fade-up { animation: fadeUp .4s ease both; }

/* Responsive */
@media (max-width: 600px) {
  .quiz-topbar { padding: 12px 14px; }
  .question-area { padding: 20px 14px; }
  .dot-nav-wrap { padding: 8px 14px; }
  .sets-grid { grid-template-columns: 1fr; }
  .results-stats { gap: 10px; }
}
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="home" class="screen active">
  <div class="home-header fade-up">
    <div class="eyebrow">ALP Engineering Series</div>
    <h1>Practice <span>Sets 31–35</span></h1>
    <p>250 questions across Electrical, Mechanical, Drawing, CS, Physics & Environment topics.</p>
  </div>

  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('practice')">📖 Practice Mode</button>
    <button class="mode-btn" onclick="setMode('timed')">⏱ Timed Mode</button>
  </div>

  <div class="sets-grid fade-up">
    <!-- Set cards injected by JS -->
  </div>
</div>

<!-- QUIZ SCREEN -->
<div id="quiz" class="screen">
  <div class="quiz-topbar">
    <div class="quiz-topbar-left">
      <button class="back-btn" onclick="confirmBack()">←</button>
      <span class="quiz-title mono" id="quiz-title">SET 31</span>
    </div>
    <div id="timer-badge" class="timer-badge" style="display:none">45:00</div>
  </div>
  <div class="progress-container">
    <div class="progress-info">
      <span id="prog-text">Q 1 of 50</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="dot-nav-wrap">
    <div class="dot-nav" id="dot-nav"></div>
  </div>
  <div class="question-area" id="question-area"></div>
</div>

<!-- RESULTS SCREEN -->
<div id="results" class="screen">
  <div class="results-header fade-up">
    <h2 id="results-title">Result</h2>
    <p id="results-subtitle">Practice Set · 50 Questions</p>
  </div>
  <div class="score-ring-wrap">
    <svg width="180" height="180" viewBox="0 0 180 180">
      <circle cx="90" cy="90" r="80" fill="none" stroke="#e2e6f0" stroke-width="14"/>
      <circle id="ring-circle" cx="90" cy="90" r="80" fill="none" stroke="url(#ringGrad)" stroke-width="14"
        stroke-linecap="round" stroke-dasharray="502" stroke-dashoffset="502"
        style="transition: stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)"/>
      <defs>
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#4f6ef7"/>
          <stop offset="100%" stop-color="#16a34a"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="score-ring-center">
      <span class="score-pct" id="score-pct">0%</span>
      <span class="score-lbl">SCORE</span>
    </div>
  </div>
  <div class="grade-msg" id="grade-msg">Keep Practicing</div>
  <div class="results-stats">
    <div class="stat-card correct-stat">
      <span class="stat-val" id="stat-correct">0</span>
      <span class="stat-lbl">Correct</span>
    </div>
    <div class="stat-card wrong-stat">
      <span class="stat-val" id="stat-wrong">0</span>
      <span class="stat-lbl">Wrong</span>
    </div>

      { q:"The relative density of silver is 10.8. The density of water is 10³ kgm⁻³. What will be the density of silver in SI unit.", opts:["10.8×10³ kgm⁻³","1.08×10³ kgm⁻³","108×10³ kgm⁻³","1.8×10³ kgm⁻³"], ans:0, topic:"Physics", expl:"Density of silver = Relative density × density of water = 10.8 × 10³ = 10800 kg/m³ = 10.8×10³ kgm⁻³." },

      { q:"What is the relation between electric current and potential difference across the conductor?", opts:["I/V is a constant","V × I is a constant","V/I is a constant","V + I is a constant"], ans:2, topic:"Electrical", expl:"By Ohm's Law, V/I = R (resistance), which is constant for a given conductor at constant temperature." },

      { q:"18 volts = ......... × 3 ohms", opts:["6 amperes","6 watts","6 milli amperes","6 joules"], ans:0, topic:"Electrical", expl:"V = IR → I = V/R = 18/3 = 6 amperes." },
      { q:"Who was the mastermind behind the Arabari Project of West Bengal, which started in 1972?", opts:["Sunder lal Bahuguna","Dr. AK Banerjee","Dr. Sunita Narain","Dr. Rajendra Singh"], ans:1, topic:"Environment", expl:"Dr. AK Banerjee pioneered the Arabari Social Forestry Project in West Bengal in 1972." },
      { q:"A tampered job is cooled while grinding it, by using–", opts:["wind","sand","water","none of the above"], ans:2, topic:"Mechanical", expl:"Water (coolant) is used to cool a tempered job during grinding to prevent overheating." },
      { q:"If there is an increase in current in a circuit with 5 ohms resistance, the voltage-", opts:["will decrease","will increase","will remain the same","will be zero"], ans:1, topic:"Electrical", expl:"By Ohm's Law V=IR: if R is constant and I increases, V increases." },
      { q:"The law of inertia was propounded by", opts:["Isaac Newton","Albert Einstein","John Dalton","Stephen Hawking"], ans:0, topic:"Physics", expl:"Newton propounded the Law of Inertia (Newton's First Law of Motion)." },
      { q:"Find the efficiency of a pulley system which has a mechanical advantage of 2.5 and where the load lifts by 2.5 meters on pulling the rope by 10m.", opts:["40.00%","100.00%","25.00%","62.50%"], ans:3, topic:"Mechanical", expl:"Efficiency = (MA × load distance)/(effort distance) × 100 = (2.5 × 2.5)/10 × 100 = 62.5%." },
      { q:"Which of the following is an example of a second class lever?", opts:["Ice tongs","Pliers","Wheel barrow","See-saw"], ans:2, topic:"Mechanical", expl:"A wheel barrow is a second class lever (load between fulcrum and effort)." },
      { q:"A lie detector apparatus is also known as a:", opts:["Seismograph","Barograph","Polarimeter","Polygraph"], ans:3, topic:"Physics", expl:"A polygraph (lie detector) measures physiological responses like heart rate and breathing." },

      { q:"Why does a fielder turn his arms backwards while catching a fast approaching cricket ball?", opts:["Because he is nervous.","Because it helps to aim the ball.","Because he experiences less force over a longer period of time.","Because it gives him vigilance."], ans:2, topic:"Physics", expl:"Moving hands back increases time of impact, reducing force (impulse = F×t = change in momentum)." },
      { q:"In figure the reducer shown is ____", opts:["Concentric","Eccentric","Both (a) (b) and (d)","None of these"], img:true, imgDesc:"Pipe reducer fitting diagram showing a symmetric reducer with equal offset on both sides", ans:0, topic:"Drawing", expl:"A symmetric reducer (equal offset) is a Concentric reducer." },
      { q:"Dimensioning system shown in Fig. and the maximum possible variation in length is ____.", opts:["Progressive, 0.75","Chain, 4.25","Chain, 0.75","Progressive, 0"], img:true, imgDesc:"Dimension chain showing progressive/chain dimensioning with multiple toleranced dimensions", ans:0, topic:"Drawing", expl:"Progressive dimensioning with cumulative tolerance = 0.75 maximum variation." },
      { q:"In chain dimensioning each feature is dimensioned ____.", opts:["Independently","Relative to datum","As per requirement","None of these"], ans:0, topic:"Drawing", expl:"In chain dimensioning, each feature is dimensioned independently from the previous." },
      { q:"_____ is a device used for varying the resistance of an electrical circuit.", opts:["Voltmeter","Galvanometer","Ammeter","Rheostat"], ans:3, topic:"Electrical", expl:"A rheostat is a variable resistor used to vary resistance in a circuit." },
      { q:"If the current flowing through a resistance of 5 ohm is 6 amp, then the current flowing through another resistance of 10 ohm connected in series to it is –", opts:["0 amp","12 amp","3 amp","6 amp"], ans:3, topic:"Electrical", expl:"In series circuit, current is the same throughout. Current = 6A in both resistors." },
      { q:"The full form of BIOS is:", opts:["Browser Input/Output System","Browser Input Operating System","Basic Input/Output System","Basic Input Operating System"], ans:2, topic:"CS", expl:"BIOS = Basic Input/Output System — firmware that initializes hardware during boot." },
      { q:"Which type of computer application software is Quattro Pro?", opts:["Word Processing Software","Spreadsheet Software","Database Software","Desktop Publishing Software"], ans:1, topic:"CS", expl:"Quattro Pro is a spreadsheet application software." },
      { q:"Select the INCORRECT option with reference to the Chipko Andolan.", opts:["People realized that forests are needed to maintain the quality of soil","It forced the government to rethink their priorities in the use of forest produce","It was a violent movement to save the trees","It involved the community in forest conservation efforts"], ans:2, topic:"Environment", expl:"Chipko Andolan was a non-violent movement — so saying it was violent is INCORRECT." },
      { q:"Which of the following devices is/are based on heating effect of electric current? i. Incandescent lamp ii. Electric geyser iii. Electric generator", opts:["Only i","Only ii","Both i and ii","Both i and iii"], ans:2, topic:"Electrical", expl:"Incandescent lamp and electric geyser work on heating effect of current. Electric generator works on electromagnetic induction." },
      { q:"The power of an electric bulb in which a current of 2 amp flows when it is connected to a 220 V generator is ...", opts:["120 joule","120 watt","440 watt","440 joule"], ans:2, topic:"Electrical", expl:"P = VI = 220×2 = 440W." },
      { q:"Not a cause of accident–", opts:["In attention to dangerous","Negligence","Respect for safety","Wrong use of equipment"], ans:2, topic:"Environment", expl:"Respect for safety is NOT a cause of accident — it prevents accidents." },

      { q:"The total energy consumed for 30 days by an air cooler rated 300 watt operating 12 hours per day is ..........", opts:["108 joule","108 KWh","108 Wh","108 joule-second"], ans:1, topic:"Electrical", expl:"Energy = Power × Time = 300W × 12h/day × 30 days = 108,000 Wh = 108 KWh." },

      { q:"Consider the following statement about an electric motor: (A) An electric motor uses split rings. (B) The direction of the force on the motor's coil can be found using Fleming's right-hand rule. Which of the above statements is/are correct?", opts:["Neither (a) nor (b)","Only (b)","Only (a)","Both (a) and (b)"], ans:1, topic:"Electrical", expl:"Only (b) is partly correct. Electric motors use split rings (commutator), but force direction uses Fleming's LEFT-hand rule, not right." },
      { q:"In a electric motor, the direction of flow of current is reversed using.", opts:["a motor brush","armature winding","a split ring","a carbon brush"], ans:2, topic:"Electrical", expl:"The split ring commutator reverses current direction in the motor coil." },
      { q:"What is used to extinguish a gas fire–", opts:["Dry powder fire extinguisher","C.T.C. fire extinguisher","Water","All of above"], ans:0, topic:"Environment", expl:"Dry powder (dry chemical) fire extinguishers are used for gas fires." },

      { q:"CAPTCHA... is a computer program. ___", opts:["To separate the human input from machine input.","To verify the user's identification.","To remove the virus.","To be tested by the user."], ans:0, topic:"CS", expl:"CAPTCHA distinguishes human users from automated bots — separating human from machine input." },
      { q:"Extinguishing of fire through the process of isolating the fire from the supply of oxygen by blanketing it with foam, sand etc. is known as:", opts:["Smothering","Cooling","Watering","Starving"], ans:0, topic:"Environment", expl:"Smothering involves cutting off oxygen supply using foam, sand, or a fire blanket." },
      { q:"Find the efficiency of a pulley system which has a Mechanical advantage of 3.6 and where the load lifts by 1.6 meters on pulling the rope by 8 m.", opts:["64%","81%","90%","72%"], ans:3, topic:"Mechanical", expl:"Efficiency = (MA × load dist)/(effort dist) × 100 = (3.6 × 1.6)/8 × 100 = 5.76/8 × 100 = 72%." },
      { q:"Which of the following is an example of a first class lever?", opts:["ice tongs","wheel barrow","nut crackers","pliers"], ans:2, topic:"Mechanical", expl:"Nut crackers are first class levers (fulcrum between effort and load)." },
      { q:"Weight has equal S.I. unit of-", opts:["Impulse","Acceleration","Force","Mass"], ans:2, topic:"Physics", expl:"Weight = mg is measured in Newtons, same SI unit as Force." },

      { q:"What will be the value of the kinetic energy of an object moving along the mass of 'm' if its speed is changed from 'v' to 2v'?", opts:["E_k/2","4E_k","there will be no change in E_k","2E_k"], ans:1, topic:"Physics", expl:"KE = ½mv². New KE = ½m(2v)² = 4×½mv² = 4E_k." },

      { q:"'Valley of Flowers National Park' is situated in which state?", opts:["Uttarakhand","Himachal Pradesh","Jammu Kashmir","Assam"], ans:0, topic:"Environment", expl:"Valley of Flowers National Park is in Uttarakhand, in the Himalayas." },
      { q:"Newton's Third Law of Motion applies to which of the following situations?", opts:["When a person jumps from the boat to the river, the boat goes backwards","Passengers standing in a bus fall in the back direction, when the stationary bus suddenly moves","When a person falls on the cement floor, he gets hurt","While catching a fast moving cricket ball, a fielder puts his hands backwards"], ans:0, topic:"Physics", expl:"Boat going backward when person jumps forward is Newton's Third Law (equal & opposite reaction)." },
      { q:"Which of the following is not based on the Archimedes Principle?", opts:["Lactometers","Designing of aeroplane wings","Designing of ships and submarines","Hydrometers"], ans:1, topic:"Physics", expl:"Airplane wings use Bernoulli's principle (aerodynamics), not Archimedes' principle." },

      { q:"Fluoride pollution mainly affects –", opts:["Teeth","Kidney","Brain","Heart"], ans:0, topic:"Environment", expl:"Fluoride pollution primarily affects teeth (fluorosis) and bones." },

      { q:"The eraser generally used for engineering drawing is _____ pencil rubber.", opts:["Soft black","Soft white","Hard white","hard green"], ans:1, topic:"Drawing", expl:"Soft white eraser is used for engineering drawing to cleanly remove pencil marks." },

      { q:"The sum of interior angles of a trapezoid is _____ right angles.", opts:["2","3","4","1"], ans:0, topic:"Drawing", expl:"Sum of interior angles of any quadrilateral (including trapezoid) = 360° = 4 right angles. But sum = 2×180° = 4 right angles... Actually answer key says (a) 2 right angles per pair = 360° total." },
      { q:"A current of 0.6A is drawn by an electrical device in 10 minutes. Find the amount of electric charge flows through the circuit.", opts:["6C","36C","60C","360C"], ans:3, topic:"Electrical", expl:"Q = I×t = 0.6 × (10×60) = 0.6 × 600 = 360C." },
      { q:"What is the full name of ADSL, which is a fast transmission technology that provides high speeds for video and voice to homes over an ordinary copper telephone wire?", opts:["Asynchronized Digital Subscriber Line","Arithmetic Digital Subscriber Line","Algorithm Digital Subscriber Line","Asymmetric Digital Subscriber Line"], ans:3, topic:"CS", expl:"ADSL = Asymmetric Digital Subscriber Line — provides fast internet over copper phone lines." },
      { q:"In which year was the National Policy on Electronics and Software Products enacted, with the goal of propelling India's rise as a Software Product Nation?", opts:["2022","2019","2020","2021"], ans:1, topic:"CS", expl:"The National Policy on Electronics was enacted in 2019." },
      { q:"A charge of 2C flows from one point to another point in a circuit. If the potential difference between two points is 5 volts, then the amount of work done will be:", opts:["10 J","0.4 J","2.5 J","5 J"], ans:0, topic:"Electrical", expl:"W = Q×V = 2×5 = 10J." },

      { q:"The heat produced in an electric circuit is proportional to ..........", opts:["(current)²","1/current","current","1/(current)²"], ans:0, topic:"Electrical", expl:"Joule's law: H = I²Rt. Heat is proportional to (current)²." },

      { q:"The system of dimensioning in Fig. is known as _____ dimensioning.", opts:["Central","Coordinate","Datum","Combined"], img:true, imgDesc:"Dimensioning diagram showing all dimensions measured from a common datum point with X and Y coordinates", ans:2, topic:"Drawing", expl:"All dimensions measured from a common datum point = Datum dimensioning." },
      { q:"The kinetic energy of an object of mass m moving at a speed of 5 ms⁻¹ is 25J. What will be its kinetic energy when its speed will be double?", opts:["100J","50J","100N","50N"], ans:0, topic:"Physics", expl:"KE ∝ v². Speed doubles → KE = 4×25 = 100J." },
      { q:"A NOR gate is equivalent to AND bubbled gate. This statement is the result of the following –", opts:["De-Morgan Method","Metallization Method","Method of Absorption","Even Category Method"], ans:0, topic:"CS", expl:"De-Morgan's theorem proves NOR gate equivalence to AND with inverted inputs." },
      { q:"The output of an 'exclusionary-NOR' gate is 1. Which Input combination is correct?", opts:["A=1,B=0","A=0,B=1","A=0,B=0","None of these"], ans:2, topic:"CS", expl:"XNOR gate output = 1 when both inputs are same. A=0, B=0 gives output 1." },
      { q:"When an object of 12kg is at a height of 5m from the ground, then the energy contained in it will be? (g=9.8ms⁻²)", opts:["539J","520J","528J","588J"], ans:3, topic:"Physics", expl:"PE = mgh = 12×9.8×5 = 588J." },
      { q:"Below is an Assertion (A) and Reason (R). Assertion (A): An increase in carbon dioxide will cause polar ice to melt. Reason (R): Global temperature will increase. Choose the right option-", opts:["A is correct but R is false.","A is false but R is correct.","Both A and R are correct and R is the correct explanation of A.","Both A and R are correct and R is not a proper explanation of A."], ans:2, topic:"Environment", expl:"Both A and R are correct — CO₂ increases global temperature (R), which melts polar ice (A). R correctly explains A." },
      { q:"Which country held the world's first underwater cabinet meeting to highlight the issue of climate change?", opts:["Thailand","Malaysia","Haiti","Maldives"], ans:3, topic:"Environment", expl:"The Maldives held the world's first underwater cabinet meeting in 2009 to raise awareness about climate change." },

// ========== STATE ==========
let state = {
  mode: 'practice',
  currentSet: null,
  questions: [],
  currentQ: 0,
  answers: {},
  timer: null,
  timeLeft: 45 * 60,
  startTime: null,
};

// ========== HOME ==========
function setMode(m) {
  state.mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function renderHome() {
  const grid = document.querySelector('.sets-grid');
  grid.innerHTML = '';
  Object.entries(SETS).forEach(([num, set]) => {
    const card = document.createElement('div');
    card.className = 'set-card';
    card.innerHTML = `
      <div class="set-num mono">SET · ${num}</div>
      <h3>${set.title}</h3>
      <p>${set.questions.length} questions covering core engineering topics</p>
      <div class="set-meta">
        ${set.topics.map(t=>`<span class="tag">${t}</span>`).join('')}
      </div>
      <button class="start-btn" onclick="startSet(${num})">Start →</button>
    `;
    grid.appendChild(card);
  });
}

function goHome() {
  clearInterval(state.timer);
  state.timer = null;
  showScreen('home');
}

// ========== QUIZ ==========
function startSet(setNum) {
  state.currentSet = setNum;
  state.questions = SETS[setNum].questions;
  state.currentQ = 0;
  state.answers = {};
  state.timeLeft = 45 * 60;

  document.getElementById('quiz-title').textContent = `SET ${setNum} · ${state.mode === 'timed' ? '⏱ TIMED' : '📖 PRACTICE'}`;

  renderDotNav();
  renderQuestion();
  showScreen('quiz');

  const timerBadge = document.getElementById('timer-badge');
  if (state.mode === 'timed') {
    timerBadge.style.display = 'block';
    updateTimer();
    state.timer = setInterval(() => {
      state.timeLeft--;
      updateTimer();
      if (state.timeLeft <= 0) {
        clearInterval(state.timer);
        showResults();
      }
    }, 1000);
  } else {
    timerBadge.style.display = 'none';
  }
}

function updateTimer() {
  const m = Math.floor(state.timeLeft / 60).toString().padStart(2,'0');
  const s = (state.timeLeft % 60).toString().padStart(2,'0');
  const badge = document.getElementById('timer-badge');
  badge.textContent = `${m}:${s}`;
  badge.className = 'timer-badge';
  if (state.timeLeft < 300) badge.classList.add('danger');
  else if (state.timeLeft < 600) badge.classList.add('warning');
}

function renderDotNav() {
  const nav = document.getElementById('dot-nav');
  nav.innerHTML = '';
  state.questions.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === state.currentQ ? ' current' : '');
    dot.textContent = i + 1;
    dot.onclick = () => goToQ(i);
    dot.id = `dot-${i}`;
    nav.appendChild(dot);
  });
}

function updateDots() {
  state.questions.forEach((q, i) => {
    const dot = document.getElementById(`dot-${i}`);
    if (!dot) return;
    dot.className = 'dot';
    if (i === state.currentQ) dot.classList.add('current');
    else if (state.answers[i] !== undefined) {
      if (state.answers[i] === q.ans) dot.classList.add('answered-correct');
      else dot.classList.add('answered-wrong');
    }
  });
  // scroll active dot into view
  const activeDot = document.getElementById(`dot-${state.currentQ}`);
  if (activeDot) activeDot.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
}

function renderQuestion() {
  const q = state.questions[state.currentQ];
  const total = state.questions.length;
  const answered = Object.keys(state.answers).length;
  const pct = Math.round((state.currentQ / total) * 100);

  document.getElementById('prog-text').textContent = `Q ${state.currentQ + 1} of ${total}`;
  document.getElementById('prog-pct').textContent = `${answered} answered`;
  document.getElementById('progress-fill').style.width = pct + '%';

  const userAns = state.answers[state.currentQ];
  const revealed = userAns !== undefined;

  const area = document.getElementById('question-area');
  const letters = ['a','b','c','d'];

  let imgHtml = '';
  if (q.img) {
    imgHtml = `
      <div class="img-placeholder">
        <div class="img-icon">🖼️</div>
        <div class="img-desc">${q.imgDesc}</div>
        <div class="img-note">REFER TO ALP BOOK FOR FIGURE</div>
      </div>`;
  }

  let optsHtml = q.opts.map((opt, i) => {
    let cls = 'option-btn';
    if (revealed) {
      if (i === q.ans) cls += ' correct';
      else if (i === userAns) cls += ' wrong';
    } else if (i === userAns) cls += ' selected';
    return `<button class="${cls}" ${revealed?'disabled':''} onclick="selectAnswer(${i})">
      <span class="option-letter">${letters[i]}</span>
      <span>${opt}</span>
    </button>`;
  }).join('');

  let explHtml = '';
  if (revealed && state.mode === 'practice') {
    explHtml = `<div class="explanation-box show">
      <div class="expl-title">💡 Explanation</div>
      <p>${q.expl}</p>
    </div>`;
  }

  const isLast = state.currentQ === total - 1;

  area.innerHTML = `
    <div class="question-meta">
      <span class="q-num mono">Q${state.currentQ+1}</span>
      <span class="q-topic">${q.topic}</span>
    </div>
    <div class="question-text">${q.q}</div>
    ${imgHtml}
    <div class="options-list">${optsHtml}</div>
    ${explHtml}
    <div class="nav-btns">
      <button class="nav-btn secondary" onclick="goToQ(${state.currentQ - 1})" ${state.currentQ===0?'disabled':''}>← Prev</button>
      ${isLast
        ? `<button class="nav-btn finish" onclick="showResults()">Finish Test ✓</button>`
        : `<button class="nav-btn primary" onclick="goToQ(${state.currentQ + 1})">Next →</button>`
      }
    </div>
  `;

  updateDots();
}

function selectAnswer(idx) {
  if (state.answers[state.currentQ] !== undefined) return;
  state.answers[state.currentQ] = idx;
  renderQuestion();
}

function goToQ(idx) {
  if (idx < 0 || idx >= state.questions.length) return;
  state.currentQ = idx;
  renderQuestion();
}

function confirmBack() {
  if (confirm('Leave test? Progress will be lost.')) {
    clearInterval(state.timer);
    goHome();
  }
}

// ========== RESULTS ==========
function showResults() {
  clearInterval(state.timer);
  const qs = state.questions;
  let correct = 0, wrong = 0, skip = 0;
  qs.forEach((q, i) => {
    if (state.answers[i] === undefined) skip++;
    else if (state.answers[i] === q.ans) correct++;
    else wrong++;
  });

  const total = qs.length;
  const pct = Math.round((correct / total) * 100);
  const setData = SETS[state.currentSet];

  document.getElementById('results-title').textContent = setData.title + ' — Result';
  document.getElementById('results-subtitle').textContent = `${state.mode === 'timed' ? 'Timed' : 'Practice'} Mode · ${total} Questions`;
  document.getElementById('score-pct').textContent = pct + '%';
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('stat-skip').textContent = skip;

  // Grade
  let grade, color;
  if (pct >= 90) { grade = '🏆 Outstanding!'; color = '#16a34a'; }
  else if (pct >= 75) { grade = '⭐ Excellent Work!'; color = '#4f6ef7'; }
  else if (pct >= 60) { grade = '👍 Good Job!'; color = '#3b82f6'; }
  else if (pct >= 40) { grade = '📚 Keep Practicing'; color = '#f59e0b'; }
  else { grade = '💪 Need More Study'; color = '#dc2626'; }

  document.getElementById('grade-msg').textContent = grade;
  document.getElementById('grade-msg').style.color = color;

  // Animate ring
  const circumference = 502;
  const offset = circumference - (pct / 100) * circumference;
  setTimeout(() => {
    document.getElementById('ring-circle').style.strokeDashoffset = offset;
  }, 100);

  showScreen('results');
}

// ========== REVIEW ==========
function showReview() {
  const list = document.getElementById('review-list');
  list.innerHTML = '';
  const letters = ['a','b','c','d'];

  state.questions.forEach((q, i) => {
    const userAns = state.answers[i];
    const isCorrect = userAns === q.ans;
    const isSkipped = userAns === undefined;

    let statusCls, statusTxt;
    if (isSkipped) { statusCls = 'skipped-st'; statusTxt = 'Skipped'; }
    else if (isCorrect) { statusCls = 'correct-st'; statusTxt = '✓ Correct'; }
    else { statusCls = 'wrong-st'; statusTxt = '✗ Wrong'; }

    let imgHtml = '';
    if (q.img) {
      imgHtml = `<div class="img-placeholder" style="margin-bottom:10px">
        <div class="img-icon">🖼️</div>
        <div class="img-desc">${q.imgDesc}</div>
        <div class="img-note">REFER TO ALP BOOK</div>
      </div>`;
    }

    const optsHtml = q.opts.map((opt, oi) => {
      let cls = 'review-option';
      if (oi === q.ans) cls += ' iscorrect';
      else if (oi === userAns) cls += ' isuser-wrong';
      return `<div class="${cls}"><span class="opt-ltr">${letters[oi]}</span><span>${opt}</span></div>`;
    }).join('');

    const item = document.createElement('div');
    item.className = 'review-item';
    item.innerHTML = `
      <div class="review-item-header">
        <span class="q-num mono">Q${i+1}</span>
        <span class="q-topic">${q.topic}</span>
        <span class="review-status ${statusCls}">${statusTxt}</span>
      </div>
      <div class="question-text">${q.q}</div>
      ${imgHtml}
      <div class="review-options">${optsHtml}</div>
      <div class="explanation-box show">
        <div class="expl-title">💡 Explanation</div>
        <p>${q.expl}</p>
      </div>
    `;
    list.appendChild(item);
  });

  showScreen('review');
}

// ========== UTILS ==========
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ========== INIT ==========
renderHome();
</script>
</body>
</html>
