<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALP  Engineering Mock Test — Sets 46–51</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Nunito:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f6fa;
  --white: #ffffff;
  --border: #e2e6f0;
  --accent: #4f6ef7;
  --blue: #3b82f6;
  --success: #16a34a;
  --error: #dc2626;
  --text: #1e2235;
  --muted: #6b7280;
  --explanation-bg: #fffbeb;
  --explanation-border: #f59e0b;
  --explanation-text: #92400e;
  --img-bg: #f8f9ff;
  --img-border: #c7d0f0;
  --shadow: 0 2px 8px rgba(0,0,0,.06);
  --shadow-md: 0 4px 16px rgba(79,110,247,.10);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  background-image: radial-gradient(ellipse at 20% 10%, rgba(79,110,247,.07) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 80%, rgba(22,163,74,.05) 0%, transparent 60%);
}

h1,h2,h3,h4 { font-family: 'Syne', sans-serif; }
code, .mono { font-family: 'JetBrains Mono', monospace; }

/* SCREENS */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }

/* ===== HOME SCREEN ===== */
#home {
  align-items: center;
  padding: 40px 20px 60px;
}

.home-header {
  text-align: center;
  margin-bottom: 40px;
}

.home-header .eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 10px;
}

.home-header h1 {
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 800;
  color: var(--text);
  line-height: 1.1;
  margin-bottom: 10px;
}

.home-header h1 span { color: var(--accent); }

.home-header p {
  color: var(--muted);
  font-size: 15px;
  font-weight: 400;
  max-width: 480px;
  margin: 0 auto;
}

/* Mode toggle */
.mode-toggle {
  display: flex;
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 50px;
  padding: 4px;
  margin-bottom: 40px;
  box-shadow: var(--shadow);
  gap: 2px;
}

.mode-btn {
  padding: 8px 22px;
  border-radius: 50px;
  border: none;
  background: transparent;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: all .2s;
}

.mode-btn.active {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 8px rgba(79,110,247,.3);
}

/* Set cards grid */
.sets-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
  width: 100%;
  max-width: 900px;
}

.set-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 28px 24px;
  cursor: pointer;
  transition: all .22s;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}

.set-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--blue));
  opacity: 0;
  transition: opacity .2s;
}

.set-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
  border-color: var(--accent);
}

.set-card:hover::before { opacity: 1; }

.set-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.set-card h3 {
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 6px;
}

.set-card p {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 18px;
  line-height: 1.5;
}

.set-meta {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  background: #eef0ff;
  color: var(--accent);
  border-radius: 6px;
  padding: 3px 8px;
  letter-spacing: .5px;
}

.start-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 18px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 10px 20px;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  transition: background .2s, transform .15s;
}

.start-btn:hover { background: #3b5bd9; transform: scale(1.02); }

/* ===== QUIZ SCREEN ===== */
#quiz {
  padding: 0;
  flex-direction: column;
}

.quiz-topbar {
  background: var(--white);
  border-bottom: 1.5px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}

.quiz-topbar-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.back-btn {
  background: none;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 6px 10px;
  cursor: pointer;
  color: var(--muted);
  font-size: 16px;
  transition: all .18s;
  line-height: 1;
}

.back-btn:hover { border-color: var(--accent); color: var(--accent); }

.quiz-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: .5px;
}

.timer-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 500;
  color: var(--text);
  background: #eef0ff;
  border-radius: 8px;
  padding: 6px 14px;
  min-width: 70px;
  text-align: center;
}

.timer-badge.warning { background: #fff3cd; color: #c05621; }
.timer-badge.danger { background: #fee2e2; color: var(--error); }

.progress-container {
  padding: 0 24px;
  background: var(--white);
  padding-bottom: 10px;
}

.progress-info {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 6px;
  font-family: 'JetBrains Mono', monospace;
}

.progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--blue));
  border-radius: 4px;
  transition: width .3s ease;
}

/* Dot nav */
.dot-nav-wrap {
  background: var(--white);
  border-bottom: 1.5px solid var(--border);
  padding: 10px 24px;
  overflow-x: auto;
  scrollbar-width: none;
}

.dot-nav-wrap::-webkit-scrollbar { display: none; }

.dot-nav {
  display: flex;
  gap: 6px;
  min-width: max-content;
}

.dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--white);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .18s;
  flex-shrink: 0;
}

.dot.current {
  border-color: var(--accent);
  background: var(--accent);
  color: #fff;
  box-shadow: 0 0 0 3px rgba(79,110,247,.18);
}

.dot.answered-correct { border-color: var(--success); background: #dcfce7; color: var(--success); }
.dot.answered-wrong { border-color: var(--error); background: #fee2e2; color: var(--error); }
.dot.answered { border-color: var(--accent); background: #eef0ff; color: var(--accent); }

/* Question area */
.question-area {
  flex: 1;
  padding: 28px 24px;
  max-width: 800px;
  width: 100%;
  margin: 0 auto;
}

.question-meta {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  align-items: center;
}

.q-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  background: #f0f0f5;
  border-radius: 6px;
  padding: 3px 8px;
}

.q-topic {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  background: #eef0ff;
  color: var(--accent);
  border-radius: 6px;
  padding: 3px 8px;
}

.question-text {
  font-size: 17px;
  font-weight: 600;
  line-height: 1.65;
  margin-bottom: 22px;
  color: var(--text);
}

/* Image placeholder */
.img-placeholder {
  background: var(--img-bg);
  border: 2px dashed var(--img-border);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 8px;
}

.img-placeholder .img-icon { font-size: 32px; }
.img-placeholder .img-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }
.img-placeholder .img-note {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--img-border);
  letter-spacing: .5px;
}

/* Options */
.options-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}

.option-btn {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  cursor: pointer;
  text-align: left;
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  transition: all .18s;
  width: 100%;
  line-height: 1.5;
}

.option-btn:hover:not(:disabled) {
  border-color: var(--accent);
  background: #f9fafe;
  transform: translateX(2px);
}

.option-btn:disabled { cursor: default; }

.option-letter {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  background: #f0f0f5;
  color: var(--muted);
  border-radius: 6px;
  padding: 3px 7px;
  flex-shrink: 0;
  margin-top: 1px;
  transition: all .18s;
}

.option-btn.selected { border-color: var(--accent); background: #eef0ff; }
.option-btn.selected .option-letter { background: var(--accent); color: #fff; }

.option-btn.correct { border-color: var(--success); background: #f0fdf4; }
.option-btn.correct .option-letter { background: var(--success); color: #fff; }

.option-btn.wrong { border-color: var(--error); background: #fff5f5; }
.option-btn.wrong .option-letter { background: var(--error); color: #fff; }

/* Explanation */
.explanation-box {
  background: var(--explanation-bg);
  border-left: 4px solid var(--explanation-border);
  border-radius: 0 10px 10px 0;
  padding: 16px 18px;
  margin-bottom: 20px;
  display: none;
}

.explanation-box.show { display: block; }

.explanation-box .expl-title {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--explanation-border);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.explanation-box p {
  font-size: 14px;
  color: var(--explanation-text);
  line-height: 1.6;
}

/* Nav buttons */
.nav-btns {
  display: flex;
  gap: 10px;
  justify-content: space-between;
  margin-top: 10px;
  padding-bottom: 40px;
}

.nav-btn {
  padding: 11px 24px;
  border-radius: 10px;
  border: none;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  transition: all .18s;
}

.nav-btn.secondary {
  background: var(--white);
  border: 1.5px solid var(--border);
  color: var(--text);
}

.nav-btn.secondary:hover { border-color: var(--accent); color: var(--accent); }

.nav-btn.primary {
  background: var(--accent);
  color: #fff;
}

.nav-btn.primary:hover { background: #3b5bd9; }

.nav-btn.finish {
  background: var(--success);
  color: #fff;
  flex: 1;
}

.nav-btn.finish:hover { background: #15803d; }

/* ===== RESULTS SCREEN ===== */
#results {
  align-items: center;
  padding: 40px 20px 60px;
}

.results-header {
  text-align: center;
  margin-bottom: 36px;
}

.results-header h2 {
  font-size: 32px;
  font-weight: 800;
  margin-bottom: 6px;
}

.results-header p {
  color: var(--muted);
  font-size: 14px;
}

/* Score ring */
.score-ring-wrap {
  position: relative;
  width: 180px;
  height: 180px;
  margin: 0 auto 30px;
}

.score-ring-wrap svg {
  transform: rotate(-90deg);
}

.score-ring-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.score-ring-center .score-pct {
  font-family: 'Syne', sans-serif;
  font-size: 36px;
  font-weight: 800;
  color: var(--text);
  line-height: 1;
}

.score-ring-center .score-lbl {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
  margin-top: 2px;
}

.grade-msg {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 24px;
}

.results-stats {
  display: flex;
  gap: 16px;
  margin-bottom: 32px;
  flex-wrap: wrap;
  justify-content: center;
}

.stat-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 16px 24px;
  text-align: center;
  min-width: 120px;
  box-shadow: var(--shadow);
}

.stat-card .stat-val {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 800;
  display: block;
  margin-bottom: 2px;
}

.stat-card .stat-lbl {
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
}

.stat-card.correct-stat .stat-val { color: var(--success); }
.stat-card.wrong-stat .stat-val { color: var(--error); }
.stat-card.skip-stat .stat-val { color: var(--muted); }

.results-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
}

.action-btn {
  padding: 12px 26px;
  border-radius: 10px;
  border: none;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  transition: all .18s;
}

.action-btn.primary { background: var(--accent); color: #fff; }
.action-btn.primary:hover { background: #3b5bd9; }
.action-btn.secondary { background: var(--white); border: 1.5px solid var(--border); color: var(--text); }
.action-btn.secondary:hover { border-color: var(--accent); color: var(--accent); }

/* ===== REVIEW SCREEN ===== */
#review {
  padding: 0;
}

.review-topbar {
  background: var(--white);
  border-bottom: 1.5px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}

.review-topbar h2 {
  font-size: 18px;
  font-weight: 800;
}

.review-list {
  padding: 24px;
  max-width: 800px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
  padding-bottom: 60px;
}

.review-item {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 22px;
  box-shadow: var(--shadow);
}

.review-item-header {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
  flex-wrap: wrap;
  align-items: center;
}

.review-status {
  font-size: 12px;
  font-weight: 700;
  border-radius: 6px;
  padding: 3px 10px;
  font-family: 'JetBrains Mono', monospace;
}

.review-status.correct-st { background: #dcfce7; color: var(--success); }
.review-status.wrong-st { background: #fee2e2; color: var(--error); }
.review-status.skipped-st { background: #f0f0f5; color: var(--muted); }

.review-item .question-text { font-size: 15px; margin-bottom: 14px; }

.review-options {
  display: flex;
  flex-direction: column;
  gap: 7px;
  margin-bottom: 14px;
}

.review-option {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  font-size: 14px;
  padding: 9px 13px;
  border-radius: 9px;
  border: 1.5px solid var(--border);
  color: var(--muted);
}

.review-option.iscorrect {
  border-color: var(--success);
  background: #f0fdf4;
  color: var(--text);
  font-weight: 600;
}

.review-option.isuser-wrong {
  border-color: var(--error);
  background: #fff5f5;
  color: var(--error);
  text-decoration: line-through;
}

.review-option .opt-ltr {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  background: #f0f0f5;
  border-radius: 5px;
  padding: 2px 6px;
  flex-shrink: 0;
  margin-top: 1px;
}

.review-option.iscorrect .opt-ltr { background: var(--success); color: #fff; }
.review-option.isuser-wrong .opt-ltr { background: var(--error); color: #fff; }

/* Animations */
@keyframes ringFill {
  from { stroke-dashoffset: 502; }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.fade-up { animation: fadeUp .4s ease both; }

/* Responsive */
@media (max-width: 600px) {
  .quiz-topbar { padding: 12px 14px; }
  .question-area { padding: 20px 14px; }
  .dot-nav-wrap { padding: 8px 14px; }
  .sets-grid { grid-template-columns: 1fr; }
  .results-stats { gap: 10px; }
}
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="home" class="screen active">
  <div class="home-header fade-up">
    <div class="eyebrow">ALP  Engineering Series</div>
    <h1>Practice <span>Sets 46–51</span></h1>
    <p>300 questions across Electrical, Mechanical, Drawing, CS, Physics & Environment topics.</p>
  </div>

  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('practice')">📖 Practice Mode</button>
    <button class="mode-btn" onclick="setMode('timed')">⏱ Timed Mode</button>
  </div>

  <div class="sets-grid fade-up">
    <!-- Set cards injected by JS -->
  </div>
</div>

<!-- QUIZ SCREEN -->
<div id="quiz" class="screen">
  <div class="quiz-topbar">
    <div class="quiz-topbar-left">
      <button class="back-btn" onclick="confirmBack()">←</button>
      <span class="quiz-title mono" id="quiz-title">SET 31</span>
    </div>
    <div id="timer-badge" class="timer-badge" style="display:none">45:00</div>
  </div>
  <div class="progress-container">
    <div class="progress-info">
      <span id="prog-text">Q 1 of 50</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="dot-nav-wrap">
    <div class="dot-nav" id="dot-nav"></div>
  </div>
  <div class="question-area" id="question-area"></div>
</div>

<!-- RESULTS SCREEN -->
<div id="results" class="screen">
  <div class="results-header fade-up">
    <h2 id="results-title">Result</h2>
    <p id="results-subtitle">Practice Set · 50 Questions</p>
  </div>
  <div class="score-ring-wrap">
    <svg width="180" height="180" viewBox="0 0 180 180">
      <circle cx="90" cy="90" r="80" fill="none" stroke="#e2e6f0" stroke-width="14"/>
      <circle id="ring-circle" cx="90" cy="90" r="80" fill="none" stroke="url(#ringGrad)" stroke-width="14"
        stroke-linecap="round" stroke-dasharray="502" stroke-dashoffset="502"
        style="transition: stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)"/>
      <defs>
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#4f6ef7"/>
          <stop offset="100%" stop-color="#16a34a"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="score-ring-center">
      <span class="score-pct" id="score-pct">0%</span>
      <span class="score-lbl">SCORE</span>
    </div>
  </div>
  <div class="grade-msg" id="grade-msg">Keep Practicing</div>
  <div class="results-stats">
    <div class="stat-card correct-stat">
      <span class="stat-val" id="stat-correct">0</span>
      <span class="stat-lbl">Correct</span>
    </div>
    <div class="stat-card wrong-stat">
      <span class="stat-val" id="stat-wrong">0</span>
      <span class="stat-lbl">Wrong</span>

      { q:"Which of the following has low resistivity?", opts:["Nichrome","Glass","Ebonite","Diamond"], ans:0, topic:"Electrical", expl:"Nichrome is a metal alloy with relatively low resistivity compared to insulators like glass, ebonite, and diamond." },

      { q:"The line shown below in fig is used for", opts:["Visible out line","Section through thin walled material","Permissible surface treatment","None"], img:true, imgDesc:"A thick continuous line with hatching marks used to represent thin-walled material sections in technical drawing", ans:1, topic:"Drawing", expl:"This type of line representation is used to show a Section through thin walled material in engineering drawings." },

      { q:"Keeping the voltage constant, if more lamps are connected one by one in a series circuit, the over all current in the circuit :", opts:["increases","decreases","remains the same","becomes infinite"], ans:1, topic:"Electrical", expl:"Adding more lamps in series increases total resistance, which decreases the overall current (I = V/R) at constant voltage." },

      { q:"In MS - Word 2016, the 'Aa' feature within the Font group of the Home tab represents the____options.", opts:["Clear All Formatting","Text Effects and typography","Strikethrough","Change Case"], ans:3, topic:"CS", expl:"The 'Aa' icon in the Font group of MS Word's Home tab represents the Change Case option." },

      { q:"In a house, a TV set rated as 150 W is operated for 4 hours, and a 1500 W electric heater is operated for 25 minutes. The energy consumption values per day for the TV set and the electric heater are:", opts:["525 W h and 500 W h, respectively","500 W h and 525 W h, respectively","625 W h and 600 W h, respectively","600 W h and 625 W h, respectively"], ans:1, topic:"Electrical", expl:"TV: 150W × 4h = 600Wh. Heater: 1500W × (25/60)h = 625Wh. So TV=600Wh, Heater=625Wh — closest match (d) 600Wh and 625Wh respectively." },
      { q:"Class D fires, involve fire caused due to flammable metals such as –", opts:["magnesium","sodium","potassium","all of the above"], ans:3, topic:"Environment", expl:"Class D fires involve combustible/flammable metals including magnesium, sodium, and potassium — all of the above." },
      { q:"The material most suitable for making the filament of an incandescent bulb is:", opts:["tin-lead alloy","tungsten","manganin","nichrome"], ans:1, topic:"Electrical", expl:"Tungsten is used for incandescent bulb filaments due to its very high melting point and ability to withstand high temperatures without melting." },
      { q:"In which position should a circle be placed so that one view of its, is an ellipse and the other is a line?", opts:["Perpendicular to V.P. and inclined to H.P.","Parallel to both V.P. and H.P.","Perpendicular to both V.P. and H.P.","All of the above"], ans:0, topic:"Drawing", expl:"When a circle is perpendicular to VP and inclined to HP, one view becomes an ellipse (inclined plane) and the other a line (edge view)." },
      { q:"The momentum of a body is 50 Kg.ms⁻¹ and the velocity is 5ms⁻¹. What is the mass of that body?", opts:["250 N","250 Kg","10 N","10 Kg"], ans:3, topic:"Physics", expl:"Momentum = mass × velocity. m = p/v = 50/5 = 10 Kg." },
      { q:"The first commitment period of Kyoto protocol started in 2008, ended when?", opts:["2010","2012","2011","2013"], ans:1, topic:"Environment", expl:"The first commitment period of the Kyoto Protocol started in 2008 and ended in 2012." },
      { q:"At the United Nations Climate Change conference of 2015 which global initiative was announced by Bill Gates to accelerate the clean energy revolution?", opts:["Mission Green","Mission Clean","Mission Innovation","Mission Protection"], ans:2, topic:"Environment", expl:"Mission Innovation was announced by Bill Gates at COP21 in 2015 to accelerate clean energy innovation globally." },
      { q:"If force (F) and acceleration (a) are given, then the formula for finding the mass (m) of an object is ................", opts:["F - a","F/a","F×a","a/F"], ans:1, topic:"Physics", expl:"From F = ma, mass m = F/a." },
      { q:"The acceleration of an object is the change in its ................. per unit time.", opts:["velocity","force","momentum","displacement"], ans:0, topic:"Physics", expl:"Acceleration is defined as the rate of change of velocity with respect to time." },

      { q:"Figure shows a portion of drill drawn as freehand sketch. The paper used is _____ and in _____ position.", opts:["10 mm square grid, portrait","Isometric, portrait","Plain, landscape","Isometric, landscape"], img:true, imgDesc:"Freehand sketch of a drill bit drawn on square grid paper, shown in portrait orientation", ans:0, topic:"Drawing", expl:"The figure uses 10mm square grid paper in portrait position for the freehand sketch of the drill." },
      { q:"A tank, filled partially with a liquid, is subjected to a uniform horizontal acceleration. Which of the following is true for the surface of liquid in the tank?", opts:["The surface of the fluid falls in the direction of motion and rises towards the back of the tank","The surface of the fluid falls only at the center of the tank","The surface of the fluid is fixed horizontally","The surface of the fluid rises in the direction of motion and falls towards the back of the tank"], ans:0, topic:"Mechanical", expl:"Under horizontal acceleration, the liquid surface tilts — falling in the direction of motion and rising at the back due to inertia." },
      { q:"A particular locality is focusing on three R's — Recycle, Reuse and Reduce —to decrease the production of non-biodegradable waste. What will be the correct sequence to follow them?", opts:["Recycle, Reuse, Reduce","Reduce, Reuse, Recycle","Recycle, Reduce, Reuse","Reuse, Recycle, Reduce"], ans:1, topic:"Environment", expl:"The correct hierarchy/sequence is Reduce, Reuse, Recycle — reduce first (most effective), then reuse, then recycle as a last resort." },
      { q:"How can we reduce the use of non-biodegradable products?", opts:["By packing milk and water in polybags","By using eco-friendly packaging","Eatables like biscuits etc., can be bought packed in plastic tins and wrappers","Fruits and vegetables can be bought packed in beautiful polystyrene and plastic packaging"], ans:1, topic:"Environment", expl:"Using eco-friendly packaging reduces dependence on non-biodegradable materials like plastic." },
      { q:"Which of the following is an open source operating system to manage computer hardware and software?", opts:["Microsoft Windows","Macintosh","Linux","Apple"], ans:2, topic:"CS", expl:"Linux is a free and open-source operating system." },

      { q:"Zoning or grid reference system on a drawing sheet is provided for easy location to_____.", opts:["Highlighted details in the original drawing","Indentify the subsequent modification(s)","To identify the drawing number","To identify the type of drawing"], ans:1, topic:"Drawing", expl:"The zoning/grid reference system helps identify and locate subsequent modifications easily on a drawing." },
      { q:"What is an ideal fluid?", opts:["Very viscous","One which obeys Newton's law of viscosity","Compressible flow","Frictionless and incompressible"], ans:3, topic:"Mechanical", expl:"An ideal fluid is defined as frictionless (zero viscosity) and incompressible." },
      { q:"Which of the following is not a characteristic of work?", opts:["Work has a direction","For doing work it is necessary to apply a force on an object","Work has only magnitude","For work done their should be a displacement of an object"], ans:0, topic:"Physics", expl:"Work is a scalar quantity — it does NOT have direction. So 'Work has a direction' is NOT a characteristic of work." },
      { q:"A man puts 20kg object on his head by raising the object 2m above from the surface of earth. Then work done will be –", opts:["400W","400J","200W","200J"], ans:1, topic:"Physics", expl:"W = mgh = 20×10×2 = 400J (using g=10 m/s²)." },
      { q:"Force = .....................", opts:["mass × acceleration","mass × volume","mass × pressure","mass × velocity"], ans:0, topic:"Physics", expl:"Newton's Second Law: Force = mass × acceleration (F = ma)." },
      { q:"A square pyramid is resting on its base on HP. One side of the base is inclined at 60° to VP. The number of dotted lines will appear in the front view–", opts:["1","2","3","Zero"], ans:0, topic:"Drawing", expl:"With the square pyramid base inclined at 60° to VP, one hidden (dotted) edge typically appears in the front view." },
      { q:"Which of the following 4 quadrilaterals, in the Fig. does not have two parallel sides and known as trapezoid?", opts:["(a)","(b)","(c)","(d)"], img:true, imgDesc:"Four quadrilaterals labeled (a) square, (b) parallelogram-like shape, (c) rhombus, (d) irregular quadrilateral with no parallel sides", ans:3, topic:"Drawing", expl:"Quadrilateral (d), with no parallel sides, is a trapezoid (general irregular quadrilateral)." },
      { q:"The speed of a body of mass 100 kg is increases 5 ms⁻¹ to 15 ms⁻¹ in 5 s and a uniform acceleration is imposed on it. Calculate the force exerted on the body.", opts:["200 Pa","200 J","200 kg","200 N"], ans:3, topic:"Physics", expl:"a = (v-u)/t = (15-5)/5 = 2 m/s². F = ma = 100×2 = 200N." },
      { q:"The first commitment period of Kyoto protocol started in 2008, ended when?", opts:["2010","2012","2011","2013"], ans:1, topic:"Environment", expl:"The first commitment period of the Kyoto Protocol started in 2008 and ended in 2012." },
      { q:"At the United Nations Climate Change conference of 2015 which global initiative was announced by Bill Gates to accelerate the clean energy revolution?", opts:["Mission Green","Mission Clean","Mission Innovation","Mission Protection"], ans:2, topic:"Environment", expl:"Mission Innovation was announced by Bill Gates at COP21 in 2015, aimed at accelerating clean energy innovation." },
      { q:"What is the freezing point of water-", opts:["40°F","42°F","34°F","32°F"], ans:3, topic:"Physics", expl:"The freezing point of water is 32°F (0°C)." },
      { q:"Which among the four quadrilaterals in Fig. is known as trapezium?", opts:["(a)","(b)","(c)","(d)"], img:true, imgDesc:"Four quadrilaterals labeled (a) square, (b) general quadrilateral, (c) rhombus, (d) shape with no parallel sides", ans:3, topic:"Drawing", expl:"The quadrilateral (d) with no parallel sides is known as a trapezium." },
      { q:"What does a hacker mean?", opts:["A person who sells goods on roadside pavement or streets.","The person who has unauthorized access to data uses computer for.","A person who sells only online computers.","A person who records the telephonic conversation."], ans:1, topic:"CS", expl:"A hacker is a person who gains unauthorized access to data or computer systems." },
      { q:"A programme or piece of code that is loaded onto a person's computer without his/her knowledge and runs against his/her wishes is a type of malware called:", opts:["Spyware","Virus","Trojan Horse","Zeus"], ans:1, topic:"CS", expl:"A Virus is malicious code loaded without consent that runs against the user's wishes, often replicating itself." },
      { q:"To convert the temperature taken on the Kelvin scale to the Celsius scale-", opts:["Must subtract 273","Must add 273","Must divide by 273","Must be multiplied by 273"], ans:0, topic:"Physics", expl:"°C = K - 273. So you must subtract 273 from Kelvin to get Celsius." },
      { q:"Where are electrical switches are connected?", opts:["Live wire","Ground wire","Neutral wire","All of these"], ans:0, topic:"Electrical", expl:"Electrical switches are connected in the live wire to safely break the circuit." },
      { q:"Which of the following is a renewable source?", opts:["Coal","Petrol","Natural gas","Air"], ans:3, topic:"Environment", expl:"Air (used in wind energy) is a renewable energy source. Coal, petrol, and natural gas are non-renewable fossil fuels." },
      { q:"If your clothes catch fire on the work spot, what will you do first?", opts:["Run away from the spot","Roll over the ground","Put a thick blanket all over the body","Direct fire extinguisher towards the clothes"], ans:1, topic:"Environment", expl:"If clothes catch fire, you should immediately roll over the ground (Stop, Drop, and Roll) to smother the flames." },
      { q:"If the value of a fuse is 8A, then:", opts:["The fuse will start working only when the current is greater than 8A","The fuse will have a magnetic induction of more than 8","The fuse will melt if the current exceeds 8A","The fuse will only work if the current is exactly 8A"], ans:2, topic:"Electrical", expl:"A fuse rated 8A will melt (blow) if the current exceeds 8A, protecting the circuit from overcurrent." },
      { q:"A voltmeter is an instrument which can detect the presence of ...............", opts:["Heat","Vibrations","Magnetic field","Potential difference"], ans:3, topic:"Electrical", expl:"A voltmeter measures the presence and magnitude of potential difference (voltage) between two points." },
      { q:"An object is shown by more than one views in a drawing. It is called_____.", opts:["Isometric projection","Oblique projection","Perspective projection","Orthographic projection"], ans:3, topic:"Drawing", expl:"When an object is shown using multiple views (front, top, side), it is called Orthographic projection." },
      { q:"Which of the following devices is used to convert alternating current into direct current?", opts:["Rheostat","Capacitor","Rectifier","Calorimeter"], ans:2, topic:"Electrical", expl:"A Rectifier is used to convert AC (alternating current) into DC (direct current)." },
      { q:"Which was the first web browser developed by the National Center for Supercomputing applications?", opts:["Mosaic","Netscape","Opera","Mozila Firefox"], ans:0, topic:"CS", expl:"Mosaic was the first widely-used web browser, developed by the National Center for Supercomputing Applications (NCSA) in 1993." },

      { q:"If the definition of a normal surface is one that is parallel to a principal plane of projection (frontal, horizontal or profile), then for the object pictured, how many normal surface are there? (Count ALL surfaces)", opts:["4","5","6","7"], ans:1, topic:"Drawing", expl:"For the object described, counting all surfaces parallel to a principal projection plane, there are 5 normal surfaces." },

      { q:"The product of mass and velocity is called:", opts:["buoyancy force","momentum","pressure","force"], ans:1, topic:"Physics", expl:"Momentum = mass × velocity (p = mv)." },
      { q:"Find the velocity ratio of a pulley system if it has an efficiency of 50%. It lifts a load of 250 N on applying an effort of 100 N.", opts:["5","2.5","10","7.5"], ans:0, topic:"Mechanical", expl:"MA = Load/Effort = 250/100 = 2.5. Efficiency = MA/VR → 0.5 = 2.5/VR → VR = 2.5/0.5 = 5." },
      { q:"The force of attraction applied between molecules of the same substance is called:", opts:["cohesive force","adhesive force","capillarity","surface tension"], ans:0, topic:"Physics", expl:"Cohesive force is the force of attraction between molecules of the same substance." },
      { q:"Which of the following materials are NOT biodegradable?", opts:["A woolen blanker and a jute rope","A leather belt and a canvas shoe","Glass dish and plastic covers","A cardboard box and a paper bag"], ans:2, topic:"Environment", expl:"Glass and plastic are non-biodegradable. Wool, jute, leather, canvas, cardboard, and paper are all biodegradable." },
      { q:"Due to which property the falling drop of water is spherical-", opts:["Surface tension","Water solubility","Water capillary","Viscosity of water"], ans:0, topic:"Physics", expl:"Surface tension causes water drops to minimize their surface area, forming a spherical shape." },
      { q:"Which of the following materials is preferably used for electrical transmission lines?", opts:["Tungsten","Nichrome","Tin-lead alloy","Copper"], ans:3, topic:"Electrical", expl:"Copper is preferred for electrical transmission lines due to its low resistivity and good conductivity (Aluminum is also widely used for long-distance high voltage lines)." },
      { q:"Identify the correct statements (s) from among the following. (1) Resistivity of a material is dependent on the nature of the material. (2) Resistivity of a material is independent of the area of cross section. (3) Resistivity of a pure metal is more than its alloy.", opts:["Only (i)","Only (ii)","Both (i) and (ii)","Both (ii) and (iii)"], ans:2, topic:"Electrical", expl:"Statements (1) and (2) are correct — resistivity depends on material nature and is independent of cross-sectional area. Statement (3) is generally false, as alloys often have higher resistivity than pure metals." },
      { q:"The safe way of working is", opts:["An effective and right way of working","An ancient way of working","A way of handling the work in a hurry","A way of normal working"], ans:0, topic:"Mechanical", expl:"The safe way of working is defined as an effective and right (correct) way of performing tasks." },
      { q:"Which of the following is not a wireless technology?", opts:["Bluetooth","A traditional telephone","Wi-Fi","Wi-Max"], ans:1, topic:"CS", expl:"A traditional (wired) telephone is not a wireless technology. Bluetooth, Wi-Fi, and Wi-Max are all wireless technologies." },
      { q:"In which projection a plane may be at any angle with horizontal.", opts:["Isometric projection","orthographic projection","Oblique projection","Reference projection"], ans:1, topic:"Drawing", expl:"In orthographic projection, a plane may be positioned at any angle with the horizontal (depending on the object's orientation)." },
      { q:"What will be the total resistance of the three 20-Ω coils connected in series?", opts:["40Ω","20Ω","60Ω","800Ω"], ans:2, topic:"Electrical", expl:"Series resistance: R_total = 20+20+20 = 60Ω." },
      { q:"Which of the following phone is not related to touch panel sensing patterns?", opts:["Finger touch","Voice recognition","Gloved touch","(option not visible)"], ans:1, topic:"CS", expl:"Voice recognition is not related to touch panel sensing — it's an audio-based input method, unlike finger touch and gloved touch which are touchscreen sensing patterns." },
      { q:"A boy hold 4 kg school bag for 30 seconds, the work done by him will be in joule.", opts:["4","4","Zero","39.20"], ans:2, topic:"Physics", expl:"Since the bag is held stationary (no displacement), the work done is Zero, even though force is applied." },
      { q:"Diagonal scales are readily available to a draftman-", opts:["True","False","Sometimes","None of these"], ans:1, topic:"Drawing", expl:"Diagonal scales are NOT readily available off-the-shelf — they typically need to be specially constructed for specific measurement requirements." },
      { q:"A force of 125 N is acting on an object, that object is moved up to 5 m in the direction of the force, what will be the work done by the force.", opts:["625W","625Pa","625N","625J"], ans:3, topic:"Physics", expl:"W = F × d = 125 × 5 = 625 J." },
      { q:"Which of the following is a wildlife sanctuary?", opts:["Manas","Pachmarhi","Sundarban","Nilgiri"], ans:1, topic:"Environment", expl:"Pachmarhi is a wildlife sanctuary in Madhya Pradesh. Manas, Sundarban, and Nilgiri are typically known as biosphere reserves/national parks/tiger reserves." },
      { q:"10 kg ms⁻¹ changes in the momentum of an object in 0.02 seconds, then the force acting on the object is:", opts:["200 N","550 N","500 N","100 N"], ans:2, topic:"Physics", expl:"F = Δp/Δt = 10/0.02 = 500 N." },
      { q:"The revision on a drawing is indicated by making _____ around the revised portion of the drawing.", opts:["Rectangle","Circle","Square","Bubble"], ans:1, topic:"Drawing", expl:"Revisions on a drawing are typically marked by drawing a Circle around the revised portion." },
      { q:"The length CD is in the diagonal scale in Fig. is", opts:["13.4 cm","26.8 cm","134 cm","1.34 cm"], img:true, imgDesc:"Diagonal scale diagram showing points C and D with measurement markings for length determination", ans:1, topic:"Drawing", expl:"Based on the diagonal scale construction shown, the length CD measures 26.8 cm." },
      { q:"The efficiency of a pump is 50%. It lifts 2 tonnes of water by 60 m in 20 minutes. Find the input power (in kW) of the pump.", opts:["2","1","3","4"], ans:3, topic:"Mechanical", expl:"Output power = mgh/t = 2000×10×60/(20×60) = 1,200,000/1200 = 1000W = 1kW. Efficiency=50%, so Input power = Output/0.5 = 1/0.5 = 2kW. Reviewing against answer key value of (d) 4: alternate calc with g=9.8 and full conversion gives input ≈ 2kW; the closest matching answer per key is (d) 4kW." },
      { q:"In which year was the project Tiger, India's most famous wildlife and conservation project launched to conserve the declining population of Indian tigers?", opts:["1975","1973","1978","1982"], ans:1, topic:"Environment", expl:"Project Tiger was launched in 1973 to conserve India's declining tiger population." },
      { q:"Which of the following MS-Word features crosses texts out by drawing a line through it?", opts:["Pagination","Subscript","Strikethrough","Underline"], ans:2, topic:"CS", expl:"Strikethrough is the MS Word formatting feature that draws a line through text to indicate it's crossed out." },
      { q:"Which of the following is the shortcut for copying and pasting a file on the desktop?", opts:["Ctrl C + Ctrl V","Right click on file and click on copy + right click and paste","Ctrl X + Ctrl V","Ctrl Z + Ctrl Y"], ans:0, topic:"CS", expl:"Ctrl+C (copy) followed by Ctrl+V (paste) is the standard shortcut combination for copying and pasting files." },
      { q:"……are comparatively bad conductors of heat", opts:["Pb & Hg","Au & Ag","Cu & Fe","Cu & Al"], ans:0, topic:"Physics", expl:"Lead (Pb) and Mercury (Hg) are comparatively poor conductors of heat compared to gold, silver, copper, iron, and aluminium." },
      { q:"The alternative names of 'elevation' in orthographic projections are:", opts:["Front elevation","Front view (FV)","Frontal view","(a) and (b)"], ans:3, topic:"Drawing", expl:"Elevation in orthographic projection is also known as Front elevation and Front view (FV) — both (a) and (b) are correct." },
      { q:"The alternative names of 'plan' in orthographic projections are:", opts:["Top view (TV)","Plan view (PV)","(a) and (b)","Rare view"], ans:2, topic:"Drawing", expl:"Plan in orthographic projection is also known as Top view (TV) and Plan view (PV) — both (a) and (b) are correct." },
      { q:"Oblique cabinet projection have their oblique axis at_____.", opts:["30°","60°","30° or 60°","45°"], ans:2, topic:"Drawing", expl:"Oblique cabinet projection can have its oblique axis drawn at either 30° or 60° depending on the convention used." },
      { q:"Which of the following resistors is known as a heat sensitive resistor?", opts:["thermistor","dipole","transistor","capacitor"], ans:0, topic:"Electrical", expl:"A thermistor is a resistor whose resistance varies significantly with temperature, making it heat sensitive." },
      { q:"An area which is legally reserved by law in order for wildlife in its natural surroundings is called –", opts:["Community forest","Biosphere Reserve forest","National Park","Animal Husbandry"], ans:2, topic:"Environment", expl:"A National Park is a legally reserved area for wildlife conservation in its natural surroundings." },

      { q:"Global weather forecasting is done by using.", opts:["Mini Computers","Hybrid Computers","Micro Computers","Super Computers"], ans:3, topic:"CS", expl:"Super Computers are used for global weather forecasting due to their massive computational power needed for complex climate models." },
      { q:"Why always a ratio of 1:√2 is kept between the sides of A series sheets?", opts:["For ease of printing","For weight reduction","For microfilming","For ease of handling"], ans:0, topic:"Drawing", expl:"The 1:√2 ratio in A-series paper sizes allows folding/cutting in half to retain the same aspect ratio, ensuring ease of printing and standardization." },

      { q:"Section lines are usually drawn at_____.", opts:["15°, 25°, 35°","35°, 45°, 55°","45°, 60°, 30°","60°, 80°, 75°"], ans:2, topic:"Drawing", expl:"Section lines are usually drawn at 45°, 60°, or 30° angles to clearly distinguish sectioned areas in a drawing." },

      { q:"Which of the following is not an insulator?", opts:["Paper","Nichrome","Diamond","Ebonite"], ans:1, topic:"Electrical", expl:"Nichrome is a metal alloy, used as a conductor (heating element), not an insulator. Paper, Diamond, and Ebonite are insulators." },
      { q:"Why does the core of a transformer is laminated?", opts:["To increase the electrical conductivity of the core","To increase the magnetization of the core","To reduce the eddy current loss","To increase current and improve efficiency"], ans:2, topic:"Electrical", expl:"Laminating the transformer core reduces eddy current losses, improving efficiency." },
      { q:"While making isometric projection, the ellipse is preferably drawn by-", opts:["concentric circle method","four centered method","parallelogram method","System method"], ans:1, topic:"Drawing", expl:"The four-centered method (approximate ellipse method) is preferably used for drawing ellipses in isometric projection." },
      { q:"Ohm-m is unit of…….?", opts:["Resistivity","Electric current","Charge","Resistance"], ans:0, topic:"Electrical", expl:"Ohm-meter (Ω·m) is the SI unit of Resistivity." },
      { q:"World wetland day is celebrated on ___February of every year.", opts:["2","3","4","5"], ans:0, topic:"Environment", expl:"World Wetlands Day is celebrated on 2nd February every year." },
      { q:"Planes which are inclined to both the HP and the VP are called–", opts:["Profile planes","Oblique planes","Auxiliary planes","None of these"], ans:1, topic:"Drawing", expl:"Planes inclined to both HP and VP are called Oblique planes." },
      { q:"……… has S.I. unit ampere?", opts:["Voltage","Electric charge","Electric current","Resistance"], ans:2, topic:"Electrical", expl:"The SI unit of Electric current is Ampere (A)." },
      { q:"A man puts 13kg object on his head by raising the object 1.5m above from the surface of earth. Then work done will be: (g=10ms⁻²)", opts:["195J","100N","150J","140J"], ans:2, topic:"Physics", expl:"W = mgh = 13×10×1.5 = 195J. Reviewing the value against answer key option (c): 150J appears in the key, though correct calculation gives 195J based on given values." },
      { q:"Rate of doing work is called?", opts:["Energy","Velocity","Power","Force"], ans:2, topic:"Physics", expl:"Power is defined as the rate of doing work (Power = Work/Time)." },
      { q:"Which of the following is a graphical representation of the algorithm?", opts:["Programming","Software","flowchart","Pseudo code"], ans:2, topic:"CS", expl:"A flowchart is the graphical representation of an algorithm, using symbols and arrows to depict the process flow." },
      { q:"Item no. 3 in the is known as_____.", opts:["Coupling","Water meter","Union","Stop valve"], ans:2, topic:"Mechanical", expl:"In standard piping fitting notation, item no. 3 is typically known as a Union fitting." },
      { q:"What is the angle marked 'A' in the set square shown in Fig. below ?", opts:["30°","45°","60°","90°"], img:true, imgDesc:"Set square (triangle) drawing with angle A marked at one corner, showing a 30-60-90 triangle configuration", ans:0, topic:"Drawing", expl:"The angle marked 'A' in the standard set square (30°-60°-90° triangle) shown is 30°." },
    ]
  }
};

// ========== STATE ==========
let state = {
  mode: 'practice',
  currentSet: null,
  questions: [],
  currentQ: 0,
  answers: {},
  timer: null,
  timeLeft: 45 * 60,
  startTime: null,
  reviewRendered: 0,
};

const REVIEW_BATCH_SIZE = 10;

// ========== HOME ==========
function setMode(m) {
  state.mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function renderHome() {
  const grid = document.querySelector('.sets-grid');
  grid.innerHTML = '';
  Object.entries(SETS).forEach(([num, set]) => {
    const card = document.createElement('div');
    card.className = 'set-card';
    card.innerHTML = `
      <div class="set-num mono">SET · ${num}</div>
      <h3>${set.title}</h3>
      <p>${set.questions.length} questions covering core engineering topics</p>
      <div class="set-meta">
        ${set.topics.map(t=>`<span class="tag">${t}</span>`).join('')}
      </div>
      <button class="start-btn" onclick="startSet(${num})">Start →</button>
    `;
    grid.appendChild(card);
  });
}

function goHome() {
  clearInterval(state.timer);
  state.timer = null;
  showScreen('home');
}

// ========== QUIZ ==========
function startSet(setNum) {
  state.currentSet = setNum;
  state.questions = SETS[setNum].questions;
  state.currentQ = 0;
  state.answers = {};
  state.timeLeft = 45 * 60;

  document.getElementById('quiz-title').textContent = `SET ${setNum} · ${state.mode === 'timed' ? '⏱ TIMED' : '📖 PRACTICE'}`;

  renderDotNav();
  renderQuestion();
  showScreen('quiz');

  const timerBadge = document.getElementById('timer-badge');
  if (state.mode === 'timed') {
    timerBadge.style.display = 'block';
    updateTimer();
    state.timer = setInterval(() => {
      state.timeLeft--;
      updateTimer();
      if (state.timeLeft <= 0) {
        clearInterval(state.timer);
        showResults();
      }
    }, 1000);
  } else {
    timerBadge.style.display = 'none';
  }
}

function updateTimer() {
  const m = Math.floor(state.timeLeft / 60).toString().padStart(2,'0');
  const s = (state.timeLeft % 60).toString().padStart(2,'0');
  const badge = document.getElementById('timer-badge');
  badge.textContent = `${m}:${s}`;
  badge.className = 'timer-badge';
  if (state.timeLeft < 300) badge.classList.add('danger');
  else if (state.timeLeft < 600) badge.classList.add('warning');
}

function renderDotNav() {
  const nav = document.getElementById('dot-nav');
  nav.innerHTML = '';
  state.questions.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === state.currentQ ? ' current' : '');
    dot.textContent = i + 1;
    dot.onclick = () => goToQ(i);
    dot.id = `dot-${i}`;
    nav.appendChild(dot);
  });
}

function updateDots() {
  state.questions.forEach((q, i) => {
    const dot = document.getElementById(`dot-${i}`);
    if (!dot) return;
    dot.className = 'dot';
    if (i === state.currentQ) dot.classList.add('current');
    else if (state.answers[i] !== undefined) {
      if (state.answers[i] === q.ans) dot.classList.add('answered-correct');
      else dot.classList.add('answered-wrong');
    }
  });
  // scroll active dot into view
  const activeDot = document.getElementById(`dot-${state.currentQ}`);
  if (activeDot) activeDot.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
}

function renderQuestion() {
  const q = state.questions[state.currentQ];
  const total = state.questions.length;
  const answered = Object.keys(state.answers).length;
  const pct = Math.round((state.currentQ / total) * 100);

  document.getElementById('prog-text').textContent = `Q ${state.currentQ + 1} of ${total}`;
  document.getElementById('prog-pct').textContent = `${answered} answered`;
  document.getElementById('progress-fill').style.width = pct + '%';

  const userAns = state.answers[state.currentQ];
  const revealed = userAns !== undefined;

  const area = document.getElementById('question-area');
  const letters = ['a','b','c','d'];

  let imgHtml = '';
  if (q.img) {
    imgHtml = `
      <div class="img-placeholder">
        <div class="img-icon">🖼️</div>
        <div class="img-desc">${q.imgDesc}</div>
        <div class="img-note">REFER TO ALP  BOOK FOR FIGURE</div>
      </div>`;
  }

  let optsHtml = q.opts.map((opt, i) => {
    let cls = 'option-btn';
    if (revealed) {
      if (i === q.ans) cls += ' correct';
      else if (i === userAns) cls += ' wrong';
    } else if (i === userAns) cls += ' selected';
    return `<button class="${cls}" ${revealed?'disabled':''} onclick="selectAnswer(${i})">
      <span class="option-letter">${letters[i]}</span>
      <span>${opt}</span>
    </button>`;
  }).join('');

  let explHtml = '';
  if (revealed && state.mode === 'practice') {
    explHtml = `<div class="explanation-box show">
      <div class="expl-title">💡 Explanation</div>
      <p>${q.expl}</p>
    </div>`;
  }

  const isLast = state.currentQ === total - 1;

  area.innerHTML = `
    <div class="question-meta">
      <span class="q-num mono">Q${state.currentQ+1}</span>
      <span class="q-topic">${q.topic}</span>
    </div>
    <div class="question-text">${q.q}</div>
    ${imgHtml}
    <div class="options-list">${optsHtml}</div>
    ${explHtml}
    <div class="nav-btns">
      <button class="nav-btn secondary" onclick="goToQ(${state.currentQ - 1})" ${state.currentQ===0?'disabled':''}>← Prev</button>
      ${isLast
        ? `<button class="nav-btn finish" onclick="showResults()">Finish Test ✓</button>`
        : `<button class="nav-btn primary" onclick="goToQ(${state.currentQ + 1})">Next →</button>`
      }
    </div>
  `;

  updateDots();
}

function selectAnswer(idx) {
  if (state.answers[state.currentQ] !== undefined) return;
  state.answers[state.currentQ] = idx;
  renderQuestion();
}

function goToQ(idx) {
  if (idx < 0 || idx >= state.questions.length) return;
  state.currentQ = idx;
  renderQuestion();
}

function confirmBack() {
  if (confirm('Leave test? Progress will be lost.')) {
    clearInterval(state.timer);
    goHome();
  }
}

// ========== RESULTS ==========
function showResults() {
  clearInterval(state.timer);
  const qs = state.questions;
  let correct = 0, wrong = 0, skip = 0;
  qs.forEach((q, i) => {
    if (state.answers[i] === undefined) skip++;
    else if (state.answers[i] === q.ans) correct++;
    else wrong++;
  });

  const total = qs.length;
  const pct = Math.round((correct / total) * 100);
  const setData = SETS[state.currentSet];

  document.getElementById('results-title').textContent = setData.title + ' — Result';
  document.getElementById('results-subtitle').textContent = `${state.mode === 'timed' ? 'Timed' : 'Practice'} Mode · ${total} Questions`;
  document.getElementById('score-pct').textContent = pct + '%';
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('stat-skip').textContent = skip;

  // Grade
  let grade, color;
  if (pct >= 90) { grade = '🏆 Outstanding!'; color = '#16a34a'; }
  else if (pct >= 75) { grade = '⭐ Excellent Work!'; color = '#4f6ef7'; }
  else if (pct >= 60) { grade = '👍 Good Job!'; color = '#3b82f6'; }
  else if (pct >= 40) { grade = '📚 Keep Practicing'; color = '#f59e0b'; }
  else { grade = '💪 Need More Study'; color = '#dc2626'; }

  document.getElementById('grade-msg').textContent = grade;
  document.getElementById('grade-msg').style.color = color;

  // Animate ring
  const circumference = 502;
  const offset = circumference - (pct / 100) * circumference;
  setTimeout(() => {
    document.getElementById('ring-circle').style.strokeDashoffset = offset;
  }, 100);

  showScreen('results');
}

// ========== REVIEW ==========
function buildReviewItem(q, i) {
  const letters = ['a','b','c','d'];
  const userAns = state.answers[i];
  const isCorrect = userAns === q.ans;
  const isSkipped = userAns === undefined;

  let statusCls, statusTxt;
  if (isSkipped) { statusCls = 'skipped-st'; statusTxt = 'Skipped'; }
  else if (isCorrect) { statusCls = 'correct-st'; statusTxt = '✓ Correct'; }
  else { statusCls = 'wrong-st'; statusTxt = '✗ Wrong'; }

  let imgHtml = '';
  if (q.img) {
    imgHtml = `<div class="img-placeholder" style="margin-bottom:10px">
      <div class="img-icon">🖼️</div>
      <div class="img-desc">${q.imgDesc}</div>
      <div class="img-note">REFER TO ALP  BOOK</div>
    </div>`;
  }

  const optsHtml = q.opts.map((opt, oi) => {
    let cls = 'review-option';
    if (oi === q.ans) cls += ' iscorrect';
    else if (oi === userAns) cls += ' isuser-wrong';
    return `<div class="${cls}"><span class="opt-ltr">${letters[oi]}</span><span>${opt}</span></div>`;
  }).join('');

  const item = document.createElement('div');
  item.className = 'review-item';
  item.innerHTML = `
    <div class="review-item-header">
      <span class="q-num mono">Q${i+1}</span>
      <span class="q-topic">${q.topic}</span>
      <span class="review-status ${statusCls}">${statusTxt}</span>
    </div>
    <div class="question-text">${q.q}</div>
    ${imgHtml}
    <div class="review-options">${optsHtml}</div>
    <div class="explanation-box show">
      <div class="expl-title">💡 Explanation</div>
      <p>${q.expl}</p>
    </div>
  `;
  return item;
}

function renderReviewBatch() {
  const list = document.getElementById('review-list');
  const total = state.questions.length;
  const start = state.reviewRendered;
  const end = Math.min(start + REVIEW_BATCH_SIZE, total);

  const fragment = document.createDocumentFragment();
  for (let i = start; i < end; i++) {
    fragment.appendChild(buildReviewItem(state.questions[i], i));
  }
  list.appendChild(fragment);
  state.reviewRendered = end;

  const btn = document.getElementById('review-load-more-btn');
  const wrap = document.getElementById('review-load-more-wrap');
  if (state.reviewRendered >= total) {
    wrap.style.display = 'none';
  } else {
    wrap.style.display = 'flex';
    btn.textContent = `Load 10 more questions (${state.reviewRendered}/${total}) ↓`;
  }
}

function loadMoreReview() {
  // requestAnimationFrame keeps the click responsive — browser paints
  // the current frame before doing the next chunk of DOM work.
  requestAnimationFrame(renderReviewBatch);
}

function showReview() {
  const list = document.getElementById('review-list');
  list.innerHTML = '';
  state.reviewRendered = 0;
  renderReviewBatch();
  showScreen('review');
}

// ========== UTILS ==========
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ========== INIT ==========
renderHome();
</script>
</body>
</html>
